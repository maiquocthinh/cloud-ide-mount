name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: read

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Set up environment
        shell: bash
        run: |
          echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build all platforms
        shell: bash
        run: |
          mkdir -p dist

          platforms=(
            "windows/amd64"
            "windows/386"
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
          )

          ldflags="-s -w -X main.version=${GITHUB_REF_NAME#v}"

          for platform in "${platforms[@]}"; do
            os_arch=(${platform//\// })
            os_name=${os_arch[0]}
            arch=${os_arch[1]}
            ext=""
            if [ "$os_name" = "windows" ]; then ext=".exe"; fi

            echo "Building: $os_name/$arch"
            GOOS=$os_name GOARCH=$arch go build -v \
              -ldflags="$ldflags" \
              -o "dist/cloud-ide-mount-${os_name}-${arch}${ext}" .
          done

      - name: Create release archive
        shell: bash
        run: |
          cd dist
          for f in cloud-ide-mount-*; do
            if [[ "$f" == *.exe ]]; then
              zip "${f%.exe}.zip" "$f"
            else
              tar czf "${f}.tar.gz" "$f"
            fi
          done
          ls -la

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum cloud-ide-mount-* > checksums.txt
          cat checksums.txt

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.zip
            dist/*.tar.gz
            dist/checksums.txt
          draft: true
          prerelease: false
          generate_release_notes: true
